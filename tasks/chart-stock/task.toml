schema_version = "1.3"
artifacts = []

[task]
name = "mimic-bench/chart-stock"
description = "Implement a PNG renderer for a small Excel-compatible stock chart subset using a queryable chart-preview oracle."
authors = [{ name = "Nuno" }]
keywords = ["oracle", "chart-rendering", "jsonl", "coding-agents"]

[metadata]
difficulty = "medium"
category = "programming"
tags = ["oracle", "black-box", "chart-rendering", "excel-compatible"]
family = "chart-rendering"
chart_type = "stock"

[agent]
timeout_sec = 5400.0
user = "agent"

[verifier]
timeout_sec = 300.0
environment_mode = "separate"
network_mode = "public"

[verifier.env]
WITAN_API_URL = "${WITAN_API_URL}"
WITAN_API_KEY = "${WITAN_API_KEY}"
QUERY_BUDGET = "${QUERY_BUDGET}"

[verifier.environment]
network_mode = "public"
cpus = 1
memory_mb = 2048
storage_mb = 4096

[environment]
build_timeout_sec = 600.0
network_mode = "public"
cpus = 1
memory_mb = 2048
storage_mb = 4096
gpus = 0

[environment.env]
QUERY_BUDGET = "${QUERY_BUDGET}"
