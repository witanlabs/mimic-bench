schema_version = "1.3"
artifacts = []

[task]
name = "oracle-bench/op002-k016"
description = "Infer and implement a mixed text/numeric anonymous Excel-backed scalar operator using at most 16 oracle queries."
authors = [{ name = "Nuno" }]
keywords = ["oracle", "spec-inference", "jsonl", "python"]

[metadata]
difficulty = "easy"
category = "programming"
tags = ["oracle", "black-box", "spec-inference", "mixed-types"]
family = "witan-formula-mixed"
budget = 16
arity = 2

[agent]
timeout_sec = 600.0
user = "agent"

[verifier]
timeout_sec = 180.0
environment_mode = "separate"
network_mode = "public"

[verifier.env]
WITAN_API_URL = "${WITAN_API_URL}"
WITAN_API_KEY = "${WITAN_API_KEY}"

[verifier.environment]
network_mode = "public"
cpus = 1
memory_mb = 1024
storage_mb = 2048

[environment]
build_timeout_sec = 600.0
network_mode = "public"
cpus = 1
memory_mb = 1024
storage_mb = 4096
gpus = 0

[environment.env]
WITAN_API_URL = "${WITAN_API_URL}"
WITAN_API_KEY = "${WITAN_API_KEY}"
